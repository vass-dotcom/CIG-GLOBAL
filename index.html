<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIG – Coordinate International Global</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#c9a84c;--dark:#0a0e1a;--navy:#0d1b3e;}
body{font-family:'Segoe UI',sans-serif;color:#fff;background:var(--dark);cursor:none;}
html{scroll-behavior:smooth;}

/* CUSTOM CURSOR */
.cursor{position:fixed;width:12px;height:12px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:transform 0.1s,background 0.2s;mix-blend-mode:difference;}
.cursor-follower{position:fixed;width:36px;height:36px;border:1.5px solid var(--gold);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:all 0.12s ease;opacity:0.6;}
.cursor.click{transform:translate(-50%,-50%) scale(2);}
.cursor-follower.click{transform:translate(-50%,-50%) scale(0.5);}

/* SCROLL PROGRESS BAR */
.scroll-progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--gold),#f5e070);z-index:9999;width:0%;transition:width 0.1s;}

/* NAV */
nav{position:fixed;top:0;width:100%;background:rgba(10,14,26,0.97);backdrop-filter:blur(16px);padding:14px 48px;display:flex;justify-content:space-between;align-items:center;z-index:1000;border-bottom:1px solid rgba(201,168,76,0.15);transition:all 0.3s;}
nav.scrolled{padding:10px 48px;background:rgba(10,14,26,0.99);}
.logo{display:flex;align-items:center;gap:12px;}
.logo img{height:64px;border-radius:6px;transition:transform 0.3s;}
.logo img:hover{transform:scale(1.05);}
.logo-text{font-size:0.95em;font-weight:700;color:#fff;letter-spacing:0.04em;line-height:1.4;}
.logo-text span{color:var(--gold);}
.nav-links{display:flex;gap:24px;list-style:none;}
.nav-links a{text-decoration:none;color:#aaa;font-size:0.82em;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;transition:color 0.2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s;}
.nav-links a:hover{color:var(--gold);}
.nav-links a:hover::after{width:100%;}
.nav-cta{padding:8px 20px;background:linear-gradient(135deg,var(--gold),#e8c060);color:#000!important;font-weight:700;border-radius:5px;text-decoration:none;font-size:0.82em;transition:transform 0.2s,box-shadow 0.2s;}
.nav-cta:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,0.35);}
.nav-cta::after{display:none!important;}

/* HERO */
.hero{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;text-align:center;padding:140px 40px 80px;overflow:hidden;}
.hero-video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0.45;}
.hero-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,rgba(10,14,26,0.88),rgba(13,27,62,0.78));z-index:1;}
.hero-particles{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;}
.hero-content{position:relative;z-index:3;max-width:920px;}
.hero-badge{display:inline-block;padding:6px 22px;border:1px solid var(--gold);border-radius:50px;font-size:0.75em;color:var(--gold);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:28px;animation:fadeInDown 1s ease both;}
.hero h1{font-size:1.5em;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;animation:fadeInDown 1s 0.2s ease both;}
.hero h2{font-size:2.8em;font-weight:800;line-height:1.2;margin-bottom:20px;color:#fff;animation:fadeInUp 1s 0.4s ease both;}
.hero h2 span{background:linear-gradient(90deg,var(--gold),#f5e070);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{font-size:1.05em;color:#a0b0c8;max-width:680px;margin:0 auto 36px;line-height:1.8;animation:fadeInUp 1s 0.6s ease both;}
.hero-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;animation:fadeInUp 1s 0.8s ease both;}
.btn-primary{padding:14px 36px;background:linear-gradient(135deg,var(--gold),#e8c060);color:#0a0e1a;font-weight:700;border-radius:6px;text-decoration:none;font-size:0.95em;transition:transform 0.2s,box-shadow 0.2s;position:relative;overflow:hidden;}
.btn-primary::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left 0.5s;}
.btn-primary:hover::before{left:100%;}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(201,168,76,0.45);}
.btn-outline{padding:14px 36px;border:1px solid rgba(201,168,76,0.5);color:var(--gold);font-weight:600;border-radius:6px;text-decoration:none;font-size:0.95em;transition:all 0.3s;backdrop-filter:blur(8px);}
.btn-outline:hover{background:rgba(201,168,76,0.1);border-color:var(--gold);transform:translateY(-3px);}
.stats-bar{display:flex;justify-content:center;flex-wrap:wrap;margin-top:70px;border-top:1px solid rgba(255,255,255,0.08);padding-top:44px;animation:fadeInUp 1s 1s ease both;}
.stat{flex:1;min-width:150px;text-align:center;padding:0 24px;border-right:1px solid rgba(255,255,255,0.08);}
.stat:last-child{border-right:none;}
.stat-num{font-size:2.4em;font-weight:900;color:var(--gold);}
.stat-label{font-size:0.78em;color:#6080a0;text-transform:uppercase;letter-spacing:0.07em;margin-top:5px;}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(40px);transition:opacity 0.8s ease,transform 0.8s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-left{opacity:0;transform:translateX(-40px);transition:opacity 0.8s ease,transform 0.8s ease;}
.reveal-left.visible{opacity:1;transform:translateX(0);}
.reveal-right{opacity:0;transform:translateX(40px);transition:opacity 0.8s ease,transform 0.8s ease;}
.reveal-right.visible{opacity:1;transform:translateX(0);}

/* SECTIONS */
section{padding:96px 64px;}
.section-tag{font-size:0.73em;color:var(--gold);text-transform:uppercase;letter-spacing:0.16em;margin-bottom:12px;font-weight:700;}
h2.section-title{font-size:2.3em;font-weight:800;margin-bottom:18px;line-height:1.2;}
h2.section-title .accent{background:linear-gradient(90deg,var(--gold),#f5e070);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.section-sub{color:#7090b0;font-size:1em;line-height:1.8;max-width:680px;margin-bottom:12px;}
.divider{width:56px;height:3px;background:linear-gradient(90deg,var(--gold),#f5e070);border-radius:2px;margin:20px 0 40px;}

/* VISION */
.vision{background:#060a14;}
.vision-inner{display:flex;gap:64px;align-items:center;flex-wrap:wrap;margin-top:48px;}
.vision-text{flex:1;min-width:300px;}
.vision-text p{color:#7090b0;line-height:1.8;margin-bottom:16px;font-size:0.95em;}
.vision-img{flex:1;min-width:300px;border-radius:18px;overflow:hidden;border:1px solid rgba(201,168,76,0.15);position:relative;}
.vision-img img{width:100%;height:380px;object-fit:cover;display:block;transition:transform 0.6s ease;}
.vision-img:hover img{transform:scale(1.05);}
.vision-img::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,0.1),transparent);pointer-events:none;}

/* VERTICALS */
.verticals{background:var(--dark);}
.verticals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:28px;margin-top:52px;}
.vertical-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:18px;overflow:hidden;transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);position:relative;}
.vertical-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,0.05),transparent);opacity:0;transition:opacity 0.3s;z-index:1;pointer-events:none;}
.vertical-card:hover{border-color:rgba(201,168,76,0.4);transform:translateY(-8px);box-shadow:0 24px 56px rgba(0,0,0,0.4),0 0 0 1px rgba(201,168,76,0.1);}
.vertical-card:hover::before{opacity:1;}
.vertical-img{width:100%;height:200px;object-fit:cover;display:block;transition:transform 0.6s ease;}
.vertical-card:hover .vertical-img{transform:scale(1.05);}
.vertical-img-placeholder{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:3.5em;background:linear-gradient(135deg,rgba(201,168,76,0.06),rgba(255,255,255,0.02));}
.vertical-body{padding:28px;position:relative;z-index:2;}
.vertical-body h3{font-size:1.15em;font-weight:700;margin-bottom:10px;color:#e0e8f0;}
.vertical-body p{font-size:0.87em;color:#6080a0;line-height:1.7;margin-bottom:16px;}
.vertical-body ul{list-style:none;margin-bottom:16px;}
.vertical-body ul li{font-size:0.84em;color:#7090a8;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;align-items:flex-start;gap:8px;}
.vertical-body ul li::before{content:'›';color:var(--gold);font-weight:700;flex-shrink:0;}
.tag{display:inline-block;padding:4px 14px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);border-radius:20px;font-size:0.74em;color:var(--gold);}

/* TOURISM */
.tourism{background:#060a14;}
.tourism-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;margin-top:52px;}
.tourism-card{border-radius:18px;overflow:hidden;position:relative;cursor:pointer;}
.tourism-card img{width:100%;height:280px;object-fit:cover;display:block;transition:transform 0.6s ease;}
.tourism-card:hover img{transform:scale(1.1);}
.tourism-overlay{position:absolute;bottom:0;left:0;right:0;padding:28px;background:linear-gradient(transparent,rgba(0,0,0,0.92));transform:translateY(10px);transition:transform 0.3s ease;}
.tourism-card:hover .tourism-overlay{transform:translateY(0);}
.tourism-overlay h3{font-size:1.25em;font-weight:700;margin-bottom:6px;}
.tourism-overlay p{font-size:0.85em;color:#b0bcc8;line-height:1.6;}

/* ENERGY */
.energy{background:var(--dark);}
.energy-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:22px;margin-top:52px;}
.energy-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:28px;transition:all 0.3s;position:relative;overflow:hidden;}
.energy-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),#f5e070);transform:scaleX(0);transition:transform 0.3s ease;}
.energy-card:hover{border-color:rgba(201,168,76,0.3);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.3);}
.energy-card:hover::after{transform:scaleX(1);}
.energy-icon{font-size:2.2em;margin-bottom:14px;}
.energy-card h3{font-size:1.05em;font-weight:700;margin-bottom:10px;color:#e0e8f0;}
.energy-card p{font-size:0.86em;color:#6080a0;line-height:1.7;}

/* SMART CITY */
.smartcity{background:#060a14;}
.smartcity-inner{display:flex;gap:64px;align-items:center;flex-wrap:wrap;margin-top:52px;}
.smartcity-img{flex:1;min-width:300px;border-radius:18px;overflow:hidden;border:1px solid rgba(201,168,76,0.15);position:relative;}
.smartcity-img img{width:100%;height:380px;object-fit:cover;display:block;transition:transform 0.6s ease;}
.smartcity-img:hover img{transform:scale(1.05);}
.smartcity-text{flex:1;min-width:300px;}
.smartcity-text h3{font-size:1.4em;font-weight:700;margin-bottom:16px;color:#e0e8f0;}
.smartcity-text p{color:#7090b0;line-height:1.8;margin-bottom:14px;font-size:0.95em;}
.pillars{list-style:none;margin-top:16px;}
.pillars li{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.88em;color:#8090a8;display:flex;align-items:center;gap:10px;transition:color 0.2s,padding-left 0.2s;}
.pillars li:hover{color:#c0d0e0;padding-left:8px;}
.pillars li::before{content:'◆';color:var(--gold);font-size:0.6em;flex-shrink:0;}

/* PRESENCE */
.presence{background:var(--dark);}
.presence-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:22px;margin-top:52px;}
.region-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden;transition:all 0.3s;}
.region-card:hover{border-color:rgba(201,168,76,0.3);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.3);}
.region-placeholder{width:100%;height:150px;display:flex;align-items:center;justify-content:center;font-size:3em;background:rgba(255,255,255,0.02);}
.region-body{padding:22px;}
.region-body h3{font-size:0.95em;font-weight:700;color:var(--gold);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.06em;}
.country-list{list-style:none;}
.country-list li{padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.84em;color:#8090b0;display:flex;align-items:center;gap:8px;transition:color 0.2s,padding-left 0.2s;}
.country-list li:hover{color:#c0d0e0;padding-left:6px;}
.country-list li:last-child{border-bottom:none;}
.country-list li::before{content:'›';color:var(--gold);font-weight:700;}

/* VALUE */
.value{background:#060a14;}
.value-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px;margin-top:52px;}
.value-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:28px;text-align:center;transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);position:relative;overflow:hidden;}
.value-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(201,168,76,0.05) 0%,transparent 70%);opacity:0;transition:opacity 0.4s;}
.value-card:hover{border-color:rgba(201,168,76,0.35);transform:translateY(-6px);box-shadow:0 20px 48px rgba(0,0,0,0.35);}
.value-card:hover::before{opacity:1;}
.value-icon{font-size:2.4em;margin-bottom:14px;transition:transform 0.3s;}
.value-card:hover .value-icon{transform:scale(1.2) rotate(5deg);}
.value-card h3{font-size:1em;font-weight:700;margin-bottom:10px;color:#e0e8f0;}
.value-card p{font-size:0.84em;color:#6080a0;line-height:1.7;}

/* HQ */
.hq{background:var(--dark);}
.hq-inner{display:flex;gap:64px;align-items:center;flex-wrap:wrap;margin-top:52px;}
.hq-img{flex:1;min-width:300px;border-radius:18px;overflow:hidden;border:1px solid rgba(201,168,76,0.2);position:relative;}
.hq-img img{width:100%;height:420px;object-fit:cover;display:block;transition:transform 0.6s ease;}
.hq-img:hover img{transform:scale(1.04);}
.hq-text{flex:1;min-width:300px;}
.hq-text h3{font-size:1.4em;font-weight:700;margin-bottom:16px;color:#e0e8f0;}
.hq-text p{color:#7090b0;line-height:1.8;font-size:0.95em;margin-bottom:14px;}
.hq-info{display:flex;flex-direction:column;gap:12px;margin-top:24px;}
.hq-info-item{display:flex;align-items:center;gap:12px;font-size:0.88em;color:#8090a8;padding:10px 14px;border-radius:8px;transition:background 0.2s;}
.hq-info-item:hover{background:rgba(255,255,255,0.03);}
.hq-info-item strong{color:#c0d0e0;}

/* CONTACT */
.contact{background:linear-gradient(135deg,#060a14,var(--navy));}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;margin-top:52px;}
.contact-info h3{font-size:1.1em;font-weight:700;margin-bottom:24px;color:#e0e0f0;}
.contact-item{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;padding:12px;border-radius:8px;transition:background 0.2s;}
.contact-item:hover{background:rgba(255,255,255,0.03);}
.contact-icon{font-size:1.3em;margin-top:2px;}
.contact-item p{color:#6080a0;font-size:0.9em;line-height:1.8;}
.contact-item strong{color:#c0d0e0;}
.form input,.form select,.form textarea{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:0.9em;margin-bottom:14px;outline:none;transition:border-color 0.2s,background 0.2s,transform 0.2s;font-family:'Segoe UI',sans-serif;}
.form input:focus,.form select:focus,.form textarea:focus{border-color:var(--gold);background:rgba(255,255,255,0.07);transform:translateY(-1px);}
.form select option{background:#0d1b3e;}
.form textarea{min-height:110px;resize:vertical;}
.submit-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--gold),#e8c060);color:#0a0e1a;font-weight:800;font-size:1em;border:none;border-radius:8px;cursor:none;transition:all 0.3s;position:relative;overflow:hidden;}
.submit-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left 0.5s;}
.submit-btn:hover::before{left:100%;}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(201,168,76,0.45);}

/* FOOTER */
footer{background:#03060e;padding:44px 64px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;border-top:1px solid rgba(201,168,76,0.12);}
.footer-left{display:flex;align-items:center;gap:14px;}
.footer-left img{height:44px;border-radius:5px;}
.footer-brand{font-size:0.9em;font-weight:700;color:var(--gold);}
.footer-brand p{font-size:0.78em;color:#405060;font-weight:400;margin-top:3px;}
footer nav{position:static;background:none;backdrop-filter:none;border:none;padding:0;flex-wrap:wrap;gap:16px;}
footer nav a{color:#405060;font-size:0.8em;text-decoration:none;transition:color 0.2s;}
footer nav a:hover{color:var(--gold);}
.footer-copy{font-size:0.78em;color:#2a3a4a;width:100%;text-align:center;padding-top:20px;border-top:1px solid rgba(255,255,255,0.04);margin-top:8px;}

/* ANIMATIONS */
@keyframes fadeInDown{from{opacity:0;transform:translateY(-30px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes pulse{0%,100%{opacity:0.4;transform:scale(1);}50%{opacity:0.8;transform:scale(1.05);}}

/* PARTICLES */
.particle{position:absolute;border-radius:50%;background:var(--gold);opacity:0.15;animation:float 6s ease-in-out infinite;}

/* GLOWING GOLD LINE */
.gold-line{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0;opacity:0.3;}
</style>
</head>
<body>

<!-- CUSTOM CURSOR -->
<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursorFollower"></div>

<!-- SCROLL PROGRESS -->
<div class="scroll-progress" id="scrollProgress"></div>

<nav id="navbar">
  <div class="logo">
    <img src="logo.png" alt="CIG Logo" onerror="this.style.display='none'">
    <div class="logo-text"><span>Coordinate</span> International Global</div>
  </div>
  <ul class="nav-links">
    <li><a href="#vision">Vision</a></li>
    <li><a href="#verticals">Sectors</a></li>
    <li><a href="#tourism">Tourism</a></li>
    <li><a href="#energy">Energy</a></li>
    <li><a href="#smartcity">Smart Cities</a></li>
    <li><a href="#presence">Global Presence</a></li>
    <li><a href="#contact" class="nav-cta">Contact Us</a></li>
  </ul>
</nav>

<section class="hero">
  <video class="hero-video" autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>
  <div class="hero-overlay"></div>
  <canvas class="hero-particles" id="particleCanvas"></canvas>
  <div class="hero-content">
    <div class="hero-badge">🌐 Multinational · 4 Continents · Kuala Lumpur</div>
    <h1>Coordinate International Global</h1>
    <h2>Building Tomorrow's<br><span>Global Infrastructure</span></h2>
    <p>CIG drives sustainable
